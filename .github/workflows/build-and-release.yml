name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-and-release:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: synkro-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact_name: synkro-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact_name: synkro-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact_name: synkro-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: synkro-windows-amd64
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact_name: synkro-windows-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          else
            VERSION="${{ github.ref }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install mingw -y --no-progress
          curl -sL https://www.sqlite.org/2024/sqlite-amalgamation-3450000.zip -o sqlite3.zip
          unzip -q sqlite3.zip
          ls sqlite3-3450000/sqlite3.h || (echo "ERROR: sqlite3.h not found after download" && exit 1)

      - name: Build binary
        shell: bash
        run: |
          export CGO_ENABLED=1
          if [ "${{ matrix.goos }}" = "windows" ]; then
            export CC=gcc
            export CGO_CFLAGS="-I${{ github.workspace }}/sqlite3-3450000"
          fi

          echo "Building ${{ matrix.artifact_name }}..."

          go build -v \
            -ldflags="-s -w \
            -X main.Version=${{ steps.version.outputs.VERSION }} \
            -X main.Commit=${{ github.sha }}" \
            -trimpath \
            -o synkro${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/synkro

          ./synkro${{ matrix.goos == 'windows' && '.exe' || '' }} version

      - name: Create installer scripts
        shell: bash
        run: |
          mkdir -p package
          cp synkro${{ matrix.goos == 'windows' && '.exe' || '' }} package/

          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp install.ps1 package/
            printf '@echo off\r\npowershell -ExecutionPolicy Bypass -File install.ps1\r\n' > package/install.bat
          else
            cp install.sh package/
            chmod +x package/install.sh
            tar czf package/synkro-${{ steps.version.outputs.VERSION }}-${{ matrix.artifact_name }}.tar.gz \
              -C package \
              synkro${{ matrix.goos == 'windows' && '.exe' || '' }} \
              install.sh
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/
          retention-days: 30

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libsqlite3-dev
          go mod download

      - name: Run tests
        env:
          CGO_ENABLED: 1
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

version: "2"

run:
  tests: true

linters:
  disable:
    - errcheck
    - gosec
    - staticcheck
  enable:
    - govet
    - ineffassign
    - unused
    - unparam
    - gocyclo
    - misspell
  settings:
    gocyclo:
      min-complexity: 25
    misspell:
      locale: US
      ignore-rules:
        - someword
        - cancelled
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

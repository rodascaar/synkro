version: "2"

run:
  timeout: 5m
  tests: true

linters:
  disable:
    - errcheck
    - gosec
    - staticcheck
  enable:
    - govet
    - ineffassign
    - unused
    - unparam
    - gocyclo
    - misspell

linters-settings:
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
    ignore-words:
      - someword

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
  max-issues-per-linter: 0
  max-same-issues: 0

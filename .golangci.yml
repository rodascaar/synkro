version: "2"

run:
  tests: true

linters:
  disable:
    - gosec
    - errcheck
  enable:
    - govet
    - ineffassign
    - unused
    - unparam
    - gocyclo
    - misspell
    - staticcheck
  settings:
    gocyclo:
      min-complexity: 25
    misspell:
      locale: US
      ignore-rules:
        - someword
        - cancelled
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
      - path: internal/config/config\.go
        linters:
          - gocyclo
      - path: internal/tui/model\.go
        linters:
          - gocyclo
      - path: internal/tui/
        linters:
          - staticcheck
      - path: internal/mcp/server\.go
        linters:
          - staticcheck
      - path: internal/tui/graph_view\.go
        linters:
          - staticcheck

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

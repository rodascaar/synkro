run:
  timeout: 5m
  tests: true

linters:
  enable:
    - gosec
    - errcheck
    - staticcheck
    - revive
    - gocyclo
    - dupl
    - misspell
    - govet
    - ineffassign
    - typecheck
    - unused
    - gosimple
    - structcheck
    - varcheck
    - deadcode
    - gofmt
    - goimports
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G104
  revive:
    confidence: 0.8
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
  gocyclo:
    min-complexity: 15
  misspell:
    locale: US
    ignore-words:
      - someword

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
